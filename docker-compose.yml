version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 9866115169@Ag
      POSTGRES_DB: myapi
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: myapi
      DB_USER: postgres
      DB_PASSWORD: 9866115169@Ag